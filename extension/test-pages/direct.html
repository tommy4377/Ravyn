<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Direct resource fixture</title>
    <style>
      .background {
        width: 640px;
        height: 360px;
        background-image: url("/files/image.svg");
      }
    </style>
  </head>
  <body>
    <h1>Direct resources</h1>
    <a href="/files/attachment.bin" download>Attachment download</a>
    <a href="/files/archive.zip">Archive link</a>
    <img
      src="/files/image.svg"
      srcset="/files/image.svg 640w, /files/image-large.svg 1280w"
      alt="Fixture"
    />
    <picture
      ><source srcset="/files/image-large.svg 2x" />
      <img src="/files/image.svg" alt="Picture fixture"
    /></picture>
    <video controls poster="/files/image.svg">
      <source src="/files/video.mp4" type="video/mp4" />
      <track src="/files/subtitles.vtt" kind="subtitles" srclang="en" />
    </video>
    <audio controls src="/files/audio.ogg"></audio>
    <object data="/files/document.pdf" type="application/pdf"></object>
    <div class="background" aria-label="CSS background fixture"></div>
    <a href="/files/playlist.m3u8">HLS manifest</a>
    <a href="/files/manifest.mpd">DASH manifest</a>
  </body>
</html>
