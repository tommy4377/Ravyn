<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ravyn Resources</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Page resources</h1>
          <div id="page" class="muted">No active page</div>
        </div>
        <div class="toolbar">
          <button id="refresh" class="icon" aria-label="Scan page again">
            ↻</button
          ><button
            id="options"
            class="icon"
            aria-label="Open extension settings"
          >
            ⚙
          </button>
        </div>
      </header>
      <div class="search-row">
        <input id="search" type="text" placeholder="Search resources" /><select
          id="type"
          aria-label="Resource type"
        >
          <option value="all">All types</option>
          <option value="image">Images</option>
          <option value="video">Video</option>
          <option value="audio">Audio</option>
          <option value="manifest">Streams</option>
          <option value="document">Documents</option>
          <option value="archive">Archives</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="filters card">
        <label
          ><input id="same-domain" type="checkbox" /> Same domain only</label
        ><label
          ><input id="new-only" type="checkbox" /> New resources only</label
        ><label
          >Minimum size
          <input
            id="minimum-size"
            type="number"
            min="0"
            step="1"
            placeholder="MB" /></label
        ><label
          >Maximum size
          <input
            id="maximum-size"
            type="number"
            min="0"
            step="1"
            placeholder="MB"
        /></label>
      </div>
      <div class="commandbar">
        <label><input id="select-all" type="checkbox" /> Select all</label
        ><span id="count" class="muted">0 resources</span
        ><button id="monitor">Monitor</button>
      </div>
      <div id="resources" class="resource-list">
        <div class="empty">Scan a page to find downloadable resources.</div>
      </div>
      <section class="download-panel card stack">
        <div class="row">
          <label class="grow"
            >Preset ID<input
              id="preset"
              type="text"
              placeholder="Optional Ravyn preset UUID" /></label
          ><label class="grow"
            >Tags<input id="tags" type="text" placeholder="browser, research"
          /></label>
        </div>
        <div class="row">
          <label class="grow"
            >Media format<input
              id="media-format"
              type="text"
              placeholder="bestvideo+bestaudio/best" /></label
          ><label
            >Maximum height<select id="max-height">
              <option value="">Original</option>
              <option value="2160">2160p</option>
              <option value="1440">1440p</option>
              <option value="1080">1080p</option>
              <option value="720">720p</option>
              <option value="480">480p</option>
            </select></label
          >
        </div>
        <label
          >After download<select id="post-processing">
            <option value="">No conversion</option>
            <option value="image-webp">Convert image to WebP</option>
            <option value="image-avif">Convert image to AVIF</option>
            <option value="audio-mp3">Convert audio to MP3</option>
            <option value="audio-opus">Convert audio to Opus</option>
            <option value="video-h264">Convert video to H.264 MP4</option>
            <option value="video-h265">Convert video to H.265 MKV</option>
          </select></label
        >
        <div class="row wrap">
          <label
            ><input id="include-cookies" type="checkbox" /> Use this site's
            session cookies</label
          ><label
            ><input id="audio-only" type="checkbox" /> Audio only for
            media</label
          ><label
            ><input id="subtitles" type="checkbox" /> Include subtitles</label
          >
        </div>
        <div class="row">
          <button id="download" class="primary grow">Download selected</button
          ><button id="add-paused">Add paused</button>
        </div>
        <div id="message" class="muted" role="status" aria-live="polite"></div>
      </section>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
