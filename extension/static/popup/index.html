<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ravyn</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="brand">
          <img src="../icons/ravyn-32.png" alt="" />
          <div>
            <strong>Ravyn</strong>
            <div id="connection" class="muted">Connecting…</div>
          </div>
        </div>
        <button id="settings" class="icon" aria-label="Open extension settings">
          ⚙
        </button>
      </header>
      <form id="quick" class="stack">
        <label
          ><span class="sr-only">Download URL</span
          ><input
            id="url"
            type="url"
            placeholder="Paste a download URL"
            autocomplete="off"
        /></label>
        <div class="row">
          <button class="primary grow" type="submit">Download</button
          ><button id="paused" type="button">Add paused</button>
        </div>
      </form>
      <section class="card stack">
        <div class="section-title">
          <strong>Current page</strong
          ><span id="page-host" class="muted"></span>
        </div>
        <div class="grid">
          <button id="analyze">Analyze media</button
          ><button id="scan">Scan resources</button
          ><button id="images">All images</button
          ><button id="monitor">Monitor page</button>
        </div>
      </section>
      <section class="card">
        <div class="section-title">
          <strong>Recent jobs</strong><span id="summary" class="muted"></span>
        </div>
        <div id="jobs" class="jobs">
          <div class="empty">No recent jobs</div>
        </div>
      </section>
      <footer>
        <button id="sidebar">Open resource sidebar</button>
        <div class="row">
          <button id="pause-all" class="icon" aria-label="Pause all downloads">
            Ⅱ</button
          ><button
            id="resume-all"
            class="icon"
            aria-label="Resume all downloads"
          >
            ▶</button
          ><button id="open-ravyn">Open Ravyn</button>
        </div>
      </footer>
      <div id="message" role="status" aria-live="polite"></div>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
