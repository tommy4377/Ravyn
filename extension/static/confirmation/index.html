<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Send to Ravyn?</title>
    <link rel="stylesheet" href="../common.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main>
      <img src="../icons/ravyn-48.png" alt="" />
      <h1>Send this download to Ravyn?</h1>
      <strong id="filename"></strong>
      <div id="url" class="muted"></div>
      <div class="row">
        <button id="continue">Keep in Firefox</button
        ><button id="send" class="primary">Send to Ravyn</button>
      </div>
      <small
        >The Firefox download resumes automatically if Ravyn does not accept
        it.</small
      >
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>
