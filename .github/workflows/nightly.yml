name: nightly-hardening

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Run bounded parser fuzzing
        shell: bash
        run: |
          set -euo pipefail
          for target in url_security cron import_lines engine_manifest metalink content_disposition content_range ytdlp_progress rqbit_payload browser_origin restore_marker native_message; do
            cargo fuzz run "$target" -- -max_total_time=60 -timeout=10
          done

  release-and-migrations:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked --all-targets
      - run: cargo build --locked --release
      - if: matrix.os == 'ubuntu-latest'
        run: cargo bench --locked --bench transfer_policy -- --noplot
  component-artifacts:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Revalidate managed component artifacts
        shell: pwsh
        run: |
          python -m unittest tools/test_validate_component_manifest.py
          python tools/validate_component_manifest.py --provision --target x86_64-pc-windows-msvc
