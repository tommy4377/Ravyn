name: release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

# Reproducibility: dependency versions are pinned by Cargo.lock (--locked),
# timestamps are pinned to the tagged commit, and absolute build paths are
# remapped so archives built from the same tag are byte-comparable.
env:
  RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}=/ravyn"

jobs:
  windows:
    runs-on: windows-2025
    environment: release
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked --all-targets
      - run: cargo build --locked --release
      - name: Generate CycloneDX SBOM
        shell: pwsh
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --format json
          New-Item -ItemType Directory -Force dist | Out-Null
          $sbom = Get-ChildItem -Recurse -Filter '*.cdx.json' | Select-Object -First 1
          if (-not $sbom) { throw 'cargo-cyclonedx did not produce a JSON SBOM' }
          Copy-Item $sbom.FullName dist\ravyn.cdx.json
      - name: Package and checksum
        shell: pwsh
        run: |
          Copy-Item target\release\ravyn.exe dist\ravyn.exe
          Compress-Archive -Path dist\ravyn.exe -DestinationPath dist\ravyn-windows-x86_64.zip
          $hash = (Get-FileHash dist\ravyn-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash *ravyn-windows-x86_64.zip" | Set-Content -NoNewline dist\ravyn-windows-x86_64.zip.sha256
      - uses: actions/attest@v4
        with:
          subject-path: dist/ravyn-windows-x86_64.zip
      - uses: actions/attest@v4
        with:
          subject-path: dist/ravyn-windows-x86_64.zip
          sbom-path: dist/ravyn.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: ravyn-windows-x86_64
          path: dist/*
          if-no-files-found: error

  portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ravyn-linux-x86_64
          - os: macos-latest
            artifact: ravyn-macos-native
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked --all-targets
      - run: cargo build --locked --release
      - name: Package and checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/ravyn dist/ravyn
          tar -C dist -czf "dist/${{ matrix.artifact }}.tar.gz" ravyn
          (cd dist && shasum -a 256 "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256")
      - uses: actions/attest@v4
        with:
          subject-path: dist/${{ matrix.artifact }}.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, portable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate updater metadata
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo '{'
            echo "  \"schema\": 1,"
            echo "  \"channel\": \"stable\","
            echo "  \"version\": \"${version}\","
            echo "  \"published_at\": \"${published_at}\","
            echo "  \"source_commit\": \"${GITHUB_SHA}\","
            echo '  "artifacts": ['
            first=1
            for checksum in dist/*.sha256; do
              hash="$(awk '{print $1}' "$checksum")"
              file="$(basename "$checksum" .sha256)"
              [ "$first" -eq 1 ] || echo ','
              first=0
              printf '    {"name": "%s", "sha256": "%s"}' "$file" "$hash"
            done
            echo ''
            echo '  ]'
            echo '}'
          } > dist/ravyn-release.json
          cat dist/ravyn-release.json
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes
