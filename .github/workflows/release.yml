name: release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

env:
  RUSTFLAGS: "--remap-path-prefix=${{ github.workspace }}=/ravyn"

jobs:
  windows-desktop:
    runs-on: windows-2025
    environment: release
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Validate frontend
        shell: pwsh
        run: |
          npm run check --prefix frontend
          npm test --prefix frontend
          npm run build --prefix frontend

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Validate synchronized release versions
        shell: pwsh
        run: |
          $tauri = (Get-Content 'src-tauri\tauri.conf.json' -Raw | ConvertFrom-Json).version
          $frontend = (Get-Content 'frontend\package.json' -Raw | ConvertFrom-Json).version
          $root = ([regex]::Match((Get-Content 'Cargo.toml' -Raw), '(?m)^version\s*=\s*"([^"]+)"')).Groups[1].Value
          $desktop = ([regex]::Match((Get-Content 'src-tauri\Cargo.toml' -Raw), '(?m)^version\s*=\s*"([^"]+)"')).Groups[1].Value
          $versions = @($tauri, $frontend, $root, $desktop) | Select-Object -Unique
          if ($versions.Count -ne 1) {
            throw "Ravyn versions are not synchronized: tauri=$tauri frontend=$frontend root=$root desktop=$desktop"
          }
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $tagVersion = $env:GITHUB_REF_NAME.TrimStart('v')
            if ($tagVersion -ne $tauri) {
              throw "Release tag v$tagVersion does not match application version $tauri"
            }
          }

      - name: Test Rust workspace
        run: cargo test --locked --workspace --all-targets

      - name: Parse generated updater helper
        shell: pwsh
        run: ./tools/validate_update_helper.ps1

      - name: Validate release signing configuration
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          UPDATE_PRIVATE_KEY: ${{ secrets.RAVYN_APP_UPDATE_PRIVATE_KEY }}
          UPDATE_PUBLIC_KEY: ${{ vars.RAVYN_APP_UPDATE_PUBLIC_KEY }}
          COMPONENT_PRIVATE_KEY: ${{ secrets.RAVYN_ENGINE_MANIFEST_PRIVATE_KEY }}
          COMPONENT_PUBLIC_KEY: ${{ vars.RAVYN_ENGINE_MANIFEST_PUBLIC_KEY }}
          WINDOWS_CERTIFICATE: ${{ secrets.RAVYN_WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.RAVYN_WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.RAVYN_AUTHENTICODE_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UPDATE_PRIVATE_KEY)) {
            throw 'RAVYN_APP_UPDATE_PRIVATE_KEY is required for tagged releases.'
          }
          if ([string]::IsNullOrWhiteSpace($env:UPDATE_PUBLIC_KEY)) {
            throw 'RAVYN_APP_UPDATE_PUBLIC_KEY is required for tagged releases.'
          }
          if ([string]::IsNullOrWhiteSpace($env:COMPONENT_PRIVATE_KEY)) {
            throw 'RAVYN_ENGINE_MANIFEST_PRIVATE_KEY is required for tagged releases.'
          }
          if ([string]::IsNullOrWhiteSpace($env:COMPONENT_PUBLIC_KEY)) {
            throw 'RAVYN_ENGINE_MANIFEST_PUBLIC_KEY is required for tagged releases.'
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            throw 'RAVYN_WINDOWS_CERTIFICATE is required for tagged releases.'
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw 'RAVYN_WINDOWS_CERTIFICATE_PASSWORD is required for tagged releases.'
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TIMESTAMP_URL)) {
            throw 'RAVYN_AUTHENTICODE_TIMESTAMP_URL is required for tagged releases.'
          }

      - name: Import Authenticode certificate and configure Tauri
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.RAVYN_WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.RAVYN_WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.RAVYN_AUTHENTICODE_TIMESTAMP_URL }}
        run: |
          $ErrorActionPreference = 'Stop'
          $certificatePath = Join-Path $env:RUNNER_TEMP 'ravyn-authenticode.pfx'
          try {
            [System.IO.File]::WriteAllBytes(
              $certificatePath,
              [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
            )
            $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
            $certificate = Import-PfxCertificate `
              -FilePath $certificatePath `
              -CertStoreLocation 'Cert:\CurrentUser\My' `
              -Password $password
            if (-not $certificate.Thumbprint) {
              throw 'The Authenticode certificate did not expose a thumbprint after import.'
            }
            $thumbprint = $certificate.Thumbprint.ToUpperInvariant()
            "RAVYN_AUTHENTICODE_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

            $configurationPath = 'src-tauri\tauri.conf.json'
            $configuration = Get-Content $configurationPath -Raw | ConvertFrom-Json
            $configuration.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $thumbprint -Force
            $configuration.bundle.windows | Add-Member -NotePropertyName digestAlgorithm -NotePropertyValue 'sha256' -Force
            $configuration.bundle.windows | Add-Member -NotePropertyName timestampUrl -NotePropertyValue $env:WINDOWS_TIMESTAMP_URL -Force
            $configuration | ConvertTo-Json -Depth 100 | Set-Content -Encoding utf8 $configurationPath
          } finally {
            Remove-Item $certificatePath -Force -ErrorAction SilentlyContinue
          }

      - name: Build Tauri desktop bundles
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          RAVYN_APP_UPDATE_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/ravyn-app-update.json
          RAVYN_APP_UPDATE_PUBLIC_KEY: ${{ vars.RAVYN_APP_UPDATE_PUBLIC_KEY }}
          RAVYN_COMPONENT_MANIFEST_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/ravyn-component-manifest.json
          RAVYN_ENGINE_MANIFEST_PUBLIC_KEY: ${{ vars.RAVYN_ENGINE_MANIFEST_PUBLIC_KEY }}
        with:
          projectPath: src-tauri
          retryAttempts: 1
          uploadUpdaterJson: false

      - name: Collect desktop artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force dist | Out-Null

          $bundleRoot = Join-Path $env:GITHUB_WORKSPACE 'target\release\bundle'
          $installers = Get-ChildItem $bundleRoot -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.msi' }
          if (-not $installers) {
            throw "Tauri did not produce an NSIS or MSI installer under $bundleRoot"
          }
          foreach ($installer in $installers) {
            Copy-Item $installer.FullName (Join-Path 'dist' $installer.Name)
          }

          $desktopExe = Join-Path $env:GITHUB_WORKSPACE 'target\release\Ravyn.exe'
          if (-not (Test-Path $desktopExe)) {
            throw "The desktop executable was not produced at $desktopExe"
          }
          Copy-Item $desktopExe 'dist\Ravyn-portable.exe'
          Compress-Archive -Path 'dist\Ravyn-portable.exe' -DestinationPath 'dist\ravyn-windows-x86_64-portable.zip'
          Remove-Item 'dist\Ravyn-portable.exe'

      - name: Verify Authenticode signatures
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            Get-Item 'target\release\Ravyn.exe'
            Get-ChildItem 'target\release\bundle' -Recurse -File |
              Where-Object { $_.Extension -in '.exe', '.msi' }
            Get-ChildItem 'dist' -File |
              Where-Object { $_.Extension -in '.exe', '.msi' }
          ) | Sort-Object FullName -Unique
          if ($files.Count -lt 5) {
            throw 'Expected the application executable, NSIS/MSI bundles, and their publishable copies before signature verification.'
          }
          if ([string]::IsNullOrWhiteSpace($env:RAVYN_AUTHENTICODE_THUMBPRINT)) {
            throw 'The imported Authenticode certificate thumbprint is unavailable.'
          }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature $file.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Invalid Authenticode signature for $($file.FullName): $($signature.StatusMessage)"
            }
            if ($null -eq $signature.SignerCertificate -or
                $signature.SignerCertificate.Thumbprint.ToUpperInvariant() -ne $env:RAVYN_AUTHENTICODE_THUMBPRINT) {
              throw "Unexpected Authenticode signer for $($file.FullName)."
            }
            if ($null -eq $signature.TimeStamperCertificate) {
              throw "The Authenticode signature for $($file.FullName) is not timestamped."
            }
          }

      - name: Generate signed application-update metadata
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          RAVYN_APP_UPDATE_PRIVATE_KEY: ${{ secrets.RAVYN_APP_UPDATE_PRIVATE_KEY }}
          RAVYN_APP_UPDATE_PUBLIC_KEY: ${{ vars.RAVYN_APP_UPDATE_PUBLIC_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = Get-ChildItem 'dist\*-setup.exe' | Select-Object -First 1
          if (-not $installer) { throw 'No NSIS installer is available for the update feed.' }
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $publishedAt = [DateTimeOffset]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ')
          $assetUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:GITHUB_REF_NAME/$($installer.Name)"
          cargo run --locked --release -p ravyn --bin manifest_tool -- sign-app-update `
            --version $version `
            --published-at $publishedAt `
            --url $assetUrl `
            --artifact $installer.FullName `
            --notes 'A signed Ravyn update is ready. See the GitHub release notes for details.' `
            --out 'dist\ravyn-app-update.json'
          cargo run --locked --release -p ravyn --bin manifest_tool -- verify-app-update `
            --signed 'dist\ravyn-app-update.json' `
            --artifact $installer.FullName `
            --public-key $env:RAVYN_APP_UPDATE_PUBLIC_KEY

      - name: Generate signed component manifest
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          RAVYN_ENGINE_MANIFEST_PRIVATE_KEY: ${{ secrets.RAVYN_ENGINE_MANIFEST_PRIVATE_KEY }}
          RAVYN_ENGINE_MANIFEST_PUBLIC_KEY: ${{ vars.RAVYN_ENGINE_MANIFEST_PUBLIC_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $manifest = Get-Content 'assets\engines\stable.json' -Raw | ConvertFrom-Json
          $now = [DateTimeOffset]::UtcNow
          $manifest | Add-Member -NotePropertyName manifest_version -NotePropertyValue $now.ToUnixTimeSeconds() -Force
          $manifest | Add-Member -NotePropertyName generated_at -NotePropertyValue $now.ToString('yyyy-MM-ddTHH:mm:ssZ') -Force
          $manifest | Add-Member -NotePropertyName expires_at -NotePropertyValue $now.AddDays(30).ToString('yyyy-MM-ddTHH:mm:ssZ') -Force
          $manifest | ConvertTo-Json -Depth 12 | Set-Content -Encoding utf8 'dist\ravyn-component-manifest-unsigned.json'
          cargo run --locked --release -p ravyn --bin manifest_tool -- sign `
            --manifest 'dist\ravyn-component-manifest-unsigned.json' `
            --out 'dist\ravyn-component-manifest.json'
          cargo run --locked --release -p ravyn --bin manifest_tool -- verify `
            'dist\ravyn-component-manifest.json' `
            $env:RAVYN_ENGINE_MANIFEST_PUBLIC_KEY
          Remove-Item 'dist\ravyn-component-manifest-unsigned.json'

      - name: Smoke-test NSIS installation
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = Get-ChildItem 'target\release\bundle\nsis\*-setup.exe' |
            Select-Object -First 1
          if (-not $installer) {
            throw 'The NSIS setup executable was not produced.'
          }

          & $installer.FullName /S
          if ($LASTEXITCODE -ne 0) {
            throw "NSIS installation failed with exit code $LASTEXITCODE"
          }

          $installedExe = Join-Path $env:LOCALAPPDATA 'Ravyn\Ravyn.exe'
          $uninstaller = Join-Path $env:LOCALAPPDATA 'Ravyn\uninstall.exe'
          if (-not (Test-Path $installedExe)) {
            throw "Installed executable not found at $installedExe"
          }
          if (-not (Test-Path $uninstaller)) {
            throw "Tauri uninstaller not found at $uninstaller"
          }

          $registration = Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\Ravyn'
          if (-not $registration.InstallLocation) {
            throw 'The installer did not register an installation location.'
          }

          $env:RAVYN_DATA_DIR = Join-Path $env:RUNNER_TEMP 'ravyn-smoke-data'
          $readyMarker = Join-Path $env:RUNNER_TEMP 'ravyn-desktop-ready.json'
          Remove-Item $readyMarker -Force -ErrorAction SilentlyContinue
          $env:RAVYN_DESKTOP_READY_FILE = $readyMarker
          $process = Start-Process -FilePath $installedExe -PassThru

          $deadline = [DateTimeOffset]::UtcNow.AddSeconds(45)
          while (-not (Test-Path $readyMarker) -and [DateTimeOffset]::UtcNow -lt $deadline) {
            if ($process.HasExited) {
              throw "Ravyn exited during the startup smoke test with code $($process.ExitCode)"
            }
            Start-Sleep -Milliseconds 250
          }
          if (-not (Test-Path $readyMarker)) {
            throw 'Ravyn did not publish its desktop readiness marker within 45 seconds.'
          }

          $ready = Get-Content $readyMarker -Raw | ConvertFrom-Json
          if ($ready.schema -ne 1 -or $ready.process_id -ne $process.Id) {
            throw 'The desktop readiness marker does not describe the launched process.'
          }
          $health = Invoke-RestMethod -Uri "$($ready.base_url)/health/ready" -TimeoutSec 10
          if (-not $health.ready -or -not $health.database_writable -or -not $health.progress_writer_running) {
            throw "The installed Ravyn backend failed readiness: $($health | ConvertTo-Json -Compress)"
          }

          Stop-Process -Id $process.Id -Force
          Remove-Item $readyMarker -Force -ErrorAction SilentlyContinue
          Remove-Item Env:RAVYN_DESKTOP_READY_FILE -ErrorAction SilentlyContinue

          & $uninstaller /S
          if ($LASTEXITCODE -ne 0) {
            throw "NSIS uninstallation failed with exit code $LASTEXITCODE"
          }
          Start-Sleep -Seconds 2
          if (Test-Path $installedExe) {
            throw 'The smoke-test uninstall left the desktop executable behind.'
          }

      - name: Generate CycloneDX SBOM
        shell: pwsh
        run: |
          cargo install cargo-cyclonedx --version 0.5.9 --locked
          cargo cyclonedx --format json
          $sbom = Get-ChildItem -Recurse -Filter '*.cdx.json' | Select-Object -First 1
          if (-not $sbom) { throw 'cargo-cyclonedx did not produce a JSON SBOM' }
          Copy-Item $sbom.FullName dist\ravyn.cdx.json

      - name: Generate SHA-256 checksums
        shell: pwsh
        run: |
          Get-ChildItem dist -File |
            Where-Object { $_.Extension -notin '.sha256' } |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              "$hash *$($_.Name)" | Set-Content -NoNewline "$($_.FullName).sha256"
            }

      - uses: actions/attest@v4
        with:
          subject-path: |
            dist/*.exe
            dist/*.msi
            dist/*.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ravyn-windows-desktop-x86_64
          path: dist/*
          if-no-files-found: error

      - name: Remove imported Authenticode certificate
        if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:RAVYN_AUTHENTICODE_THUMBPRINT)) {
            Remove-Item "Cert:\CurrentUser\My\$env:RAVYN_AUTHENTICODE_THUMBPRINT" -Force -ErrorAction SilentlyContinue
          }

  backend-portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ravyn-linux-x86_64
          - os: macos-latest
            artifact: ravyn-macos-native
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked -p ravyn --all-targets
      - run: cargo build --locked --release -p ravyn
      - name: Package and checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/release/ravyn dist/ravyn
          tar -C dist -czf "dist/${{ matrix.artifact }}.tar.gz" ravyn
          (cd dist && shasum -a 256 "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256")
      - uses: actions/attest@v4
        with:
          subject-path: dist/${{ matrix.artifact }}.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows-desktop, backend-portable]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate release metadata
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo '{'
            echo '  "schema": 1,'
            echo '  "channel": "stable",'
            echo "  \"version\": \"${version}\","
            echo "  \"published_at\": \"${published_at}\","
            echo "  \"source_commit\": \"${GITHUB_SHA}\","
            echo '  "artifacts": ['
            first=1
            for checksum in dist/*.sha256; do
              hash="$(awk '{print $1}' "$checksum")"
              file="$(basename "$checksum" .sha256)"
              [ "$first" -eq 1 ] || echo ','
              first=0
              printf '    {"name": "%s", "sha256": "%s"}' "$file" "$hash"
            done
            echo ''
            echo '  ]'
            echo '}'
          } > dist/ravyn-release.json
          cat dist/ravyn-release.json
      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --verify-tag --generate-notes
