name: backend-ci

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        rust: [stable, "1.85"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo check --locked --all-targets
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-targets
      - name: Parse generated updater helper
        if: matrix.os == 'windows-latest' && matrix.rust == 'stable'
        shell: pwsh
        run: ./tools/validate_update_helper.ps1
      - run: cargo build --locked --release


  source-contracts-and-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Audit source contracts
        run: python tools/static_source_audit.py
      - name: Validate component catalogue
        run: |
          python -m unittest tools/test_validate_component_manifest.py
          python tools/validate_component_manifest.py
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Validate frontend
        run: |
          npm run check --prefix frontend
          npm test --prefix frontend
          npm run build --prefix frontend

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - run: cargo audit --deny warnings
      - run: cargo deny check advisories licenses bans sources
